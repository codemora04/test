<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil - Système d'Audit</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="logo3.png">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0f172a">
  <script src="./pwa.js"></script>
</head>

<body>
  <div class="container">
    <h1>Système d'Audit</h1>
    <div class="user-box">
      <div id="identificationForm">
        <div class="user-note-banner">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="info-icon">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="16" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12.01" y2="8"></line>
          </svg>
          <div>
            <strong>Attention :</strong>
            <span>Veuillez entrer votre nom sous le format <b>nom prénom</b>.</span>
          </div>
        </div>
        <input type="text" id="username" placeholder="Ex: benali sara" autocomplete="off">
        <button id="validateUserBtn" class="btn-retour" type="button">Valider</button>
      </div>
      <p id="errorMessage" class="error"></p>
      <p id="successMessage" class="success"></p>
    </div>
    <div class="logos" id="logosSection" style="display:none;">
      <button class="logo-btn" id="baltimarBtn" disabled title="Audit Baltimar">
        <img src="logo1.png" width="150" alt="Baltimar">
      </button>
      <button class="logo-btn" id="reveyBtn" disabled title="Audit Revey">
        <img src="logo2.png" width="150" alt="Revey">
      </button>
    </div>
    <div id="extraButtons" style="display:none; flex-direction: column; align-items: center; gap: 20px; margin-top: 20px;">
      <button id="statsBtn" class="btn-retour" style="background-color: #0b763b; width: 100%; max-width: 350px;">
        📊 Visualiser des Graphiques
      </button>
      <button id="rapportBtn" class="btn-retour" style="background-color: #0b763b; width: 100%; max-width: 350px;">
        📄 Télécharger rapport Non-conformités
      </button>
    </div>
    <div class="btn-container">
      <button class="btn-retour" id="logoutBtn" style="background-color: #0b763b;">Déconnexion</button>
    </div>
  </div>
  <script type="module">
    import { supabase } from "./supabase.js";
    import { clearAuditProgress } from "./utils.js";

    // cette fonction verifie si l'utilisateur est connecte pour continuer a charger sinon redirige le vers login.html
    const { data: sessionData } = await supabase.auth.getSession();
    if (!sessionData.session) window.location.href = "login.html";

    // Recupertion des elements HTML
    const identificationForm = document.getElementById("identificationForm");
    const usernameInput = document.getElementById("username");
    const validateUserBtn = document.getElementById("validateUserBtn");
    const errorMessage = document.getElementById("errorMessage");
    const successMessage = document.getElementById("successMessage");
    const baltimarBtn = document.getElementById("baltimarBtn");
    const reveyBtn = document.getElementById("reveyBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const logosSection = document.getElementById("logosSection");
    const extraButtons = document.getElementById("extraButtons");
    const statsBtn = document.getElementById("statsBtn");
    function setError(msg) {
      errorMessage.textContent = msg || "";
      successMessage.textContent = "";
    }
    function setSuccess(msg) {
      successMessage.textContent = msg || "";
      errorMessage.textContent = "";
    }
    function enableLogos() {
      logosSection.style.display = "flex";
      extraButtons.style.display = "block";
      baltimarBtn.disabled = false;
      reveyBtn.disabled = false;
      identificationForm.style.display = "none";
    }
    function disableLogos() {
      logosSection.style.display = "none";
      extraButtons.style.display = "none";
      baltimarBtn.disabled = true;
      reveyBtn.disabled = true;
      identificationForm.style.display = "block";
    }
    function enableResponsable(username) {
      logosSection.style.display = "none";
      extraButtons.style.display = "flex";
      baltimarBtn.disabled = true;
      reveyBtn.disabled = true;
      identificationForm.style.display = "none";
      setSuccess("Bienvenue " + username + " !");
    }

    // Verification de sessions existante
    const savedUsername = sessionStorage.getItem("audit_username");
    const savedRole = sessionStorage.getItem("audit_user_role");
    if (savedUsername) {
      if (savedRole === "responsable") {
        enableResponsable(savedUsername);
      } else if (savedRole === "auditeur") {
        usernameInput.value = savedUsername;
        enableLogos();
        setSuccess("Bienvenue " + savedUsername + " !");
      } else {
        disableLogos();
      }
    } else {
      disableLogos();
    }
    // Le bouton de validation du username
    validateUserBtn.addEventListener("click", async () => {
      let username = usernameInput.value.trim().replace(/\s+/g, ' ');

      if (!username) {
        setError("Veuillez entrer votre nom utilisateur.");
        disableLogos();
        return;
      }

      if (username.split(/\s+/).length < 2) {
        setError("Respectez l'ordre : nom prénom.");
        disableLogos();
        return;
      }

      console.log("Checking user in Supabase:", username);
      const { data, error } = await supabase
        .from("authorized_users")
        .select("username, role")
        .ilike("username", username)
        .maybeSingle();

      if (error) {
        console.error("Supabase Error during user check:", error);
      }

      console.log("Returned data from Supabase:", data);

      if (!data) {
        // Debugging: fetch all users to help the user spot trailing spaces or typos
        const { data: allUsers } = await supabase.from("authorized_users").select("username");
        console.log("Liste exacte des noms dans la base (avec les espaces cachés ou accents) :", allUsers);
      }

      if (error || !data) {
        setError("Nom utilisateur invalide.");
        disableLogos();
        return;
      }

      username = data.username; // On utilise la casse exacte de la DB
      localStorage.setItem("username", username);
      sessionStorage.setItem("audit_username", username);
      sessionStorage.setItem("audit_user_role", data.role || "auditeur");

      if (data.role === "responsable") {
        enableResponsable(username);
      } else if (data.role === "auditeur") {
        enableLogos();
        setSuccess("Bienvenue " + username + "!");
      } else {
        disableLogos();
        setError("Rôle non reconnu.");
      }
    });


    baltimarBtn.addEventListener("click", () => {
      window.location.href = "baltimar.html";
    });

    reveyBtn.addEventListener("click", () => {
      window.location.href = "revey.html";
    });

    statsBtn.addEventListener("click", () => {
      window.location.href = "visualisation.html";
    });

    const rapportBtn = document.getElementById("rapportBtn");
    rapportBtn.addEventListener("click", async () => {
      rapportBtn.disabled = true;
      rapportBtn.textContent = "⏳ Chargement…";

      const { data, error } = await supabase
        .from("non_conformites")
        .select("*")
        .order("created_at", { ascending: false });

      rapportBtn.disabled = false;
      rapportBtn.textContent = "📄 Télécharger rapport Non-conformités";

      if (error || !data) {
        alert("Erreur lors de la récupération des non-conformités.");
        return;
      }

      if (data.length === 0) {
        alert("Aucune non-conformité enregistrée pour le moment.");
        return;
      }

      const rows = data.map(nc => {
        const date     = new Date(nc.created_at).toLocaleDateString("fr-FR");
        const delai    = new Date(nc.delai).toLocaleDateString("fr-FR");
        const photo    = nc.image_url
          ? `<img src="${nc.image_url}" style="max-width:120px;max-height:90px;object-fit:contain;border-radius:6px;">`
          : "—";
        return `<tr>
          <td>${date}</td>
          <td style="max-width:260px">${nc.description}</td>
          <td>${nc.responsable}</td>
          <td>${delai}</td>
          <td>${nc.auditeur || "—"}</td>
          <td>${photo}</td>
        </tr>`;
      }).join("");

      const generatedOn = new Date().toLocaleDateString("fr-FR", {
        year: "numeric", month: "long", day: "numeric"
      });

      const html = `<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Rapport Non-conformités</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, Arial, sans-serif; padding: 36px; color: #1e293b; font-size: 13px; }
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; border-bottom: 3px solid #f59e0b; padding-bottom: 18px; }
    .header h1 { font-size: 1.6rem; font-weight: 800; color: #1e293b; }
    .header .meta { color: #64748b; margin-top: 4px; font-size: 0.85rem; }
    .badge { background: #fef3c7; color: #b45309; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    thead th { background: #f59e0b; color: white; padding: 10px 12px; text-align: left; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; }
    tbody td { padding: 10px 12px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }
    tbody tr:nth-child(even) td { background: #f8fafc; }
    .btn-print { margin-bottom: 24px; padding: 10px 22px; background: #f59e0b; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 600; }
    .btn-print:hover { background: #d97706; }
    @media print { .no-print { display: none !important; } }
  </style>
</head>
<body>
  <button class="btn-print no-print" onclick="window.print()">🖨️ Imprimer / Enregistrer en PDF</button>
  <div class="header">
    <div>
      <h1>⚠️ Rapport Non-conformités</h1>
      <div class="meta">Généré le ${generatedOn}</div>
    </div>
    <div class="badge">${data.length} signalement${data.length > 1 ? "s" : ""}</div>
  </div>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Description</th>
        <th>Responsable</th>
        <th>Délai correction</th>
        <th>Auditeur</th>
        <th>Photo</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>
</body>
</html>`;

      const win = window.open("", "_blank");
      win.document.write(html);
      win.document.close();
    });


    logoutBtn.addEventListener("click", async () => {
      sessionStorage.clear();
      clearAuditProgress();
      await supabase.auth.signOut();
      window.location.href = "login.html";
    });
  </script>

</body>

</html>
