<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Système d'Audit</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="logo4.png">
  <meta name="theme-color" content="#0f172a">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
    }

    .back-link {
      position: absolute;
      top: 24px;
      left: 24px;
    }

    form {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 44px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
      text-align: center;
      width: 100%;
      max-width: 420px;
    }

    .login-icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, #d1fae5, #6ee7b7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 20px;
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.25);
    }

    h2 {
      margin-bottom: 30px;
      color: var(--text-main);
      font-size: 1.6rem;
    }

    .login-subtitle {
      font-size: 0.92rem;
      color: #64748b;
      margin-top: -20px;
      margin-bottom: 28px;
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 25px;
      padding: 15px;
      font-size: 1.05rem;
    }

    @media (max-width: 480px) {
      form { padding: 32px 22px; }
      .back-link { top: 16px; left: 16px; }
    }
  </style>
</head>
<script src="./pwa.js"></script>

<body>

  <!-- Back to landing -->
  <a href="landing.html" class="back-link" id="back-landing">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    Retour
  </a>

  <form id="loginForm">
    <div class="login-icon" aria-hidden="true">🔐</div>
    <h2>Connexion Audit</h2>
    <p class="login-subtitle">Accès réservé aux auditeurs autorisés</p>

    <input type="email" id="email" placeholder="Email" autocomplete="email" required>
    <div class="password-wrapper">
      <input type="password" id="password" placeholder="Mot de passe" autocomplete="current-password" required>
      <button type="button" id="togglePassword" class="toggle-password" aria-label="Afficher le mot de passe">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      </button>
    </div>

    <button type="submit" class="btn-retour">Se connecter</button>
    <p class="error" id="error"></p>
  </form>

  <script>
    document.getElementById('togglePassword').addEventListener('click', function () {
      const passwordInput = document.getElementById('password');
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);

      // Met à jour l'icône SVG
      if (type === 'text') {
        this.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        `;
      } else {
        this.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        `;
      }
    });
  </script>

  <script type="module">
    import { supabase } from "./supabase.js";

    const form = document.getElementById("loginForm");
    const errorEl = document.getElementById("error");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.textContent = "";

      const btn = form.querySelector('button[type="submit"]');
      const originalText = btn.textContent;
      btn.textContent = "Connexion...";
      btn.disabled = true;

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        errorEl.textContent = "Identifiants invalides ou erreur de connexion.";
        btn.textContent = originalText;
        btn.disabled = false;
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const redirect = params.get("redirect");
      window.location.href = redirect || "accueil.html";
    });
  </script>

</body>

</html>
