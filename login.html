<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Système d'Audit</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="logo4.png">
  <meta name="theme-color" content="#0f172a">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      /* margin: 0 */
      padding: 15px;
    }

    form {
      background: var(--surface-color);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 40px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--surface-border);
      box-shadow: var(--shadow-lg);
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    h2 {
      margin-bottom: 30px;
      color: var(--text-main);
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 25px;
      padding: 14px;
      font-size: 1.1rem;
    }
  </style>
</head>
<script src="./pwa.js"></script>

<body>

  <form id="loginForm">
    <h2>Connexion Audit</h2>

    <input type="email" id="email" placeholder="Email" autocomplete="email" required>
    <div class="password-wrapper">
      <input type="password" id="password" placeholder="Mot de passe" autocomplete="current-password" required>
      <button type="button" id="togglePassword" class="toggle-password" aria-label="Afficher le mot de passe">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      </button>
    </div>

    <button type="submit" class="btn-retour">Se connecter</button>
    <p class="error" id="error"></p>
  </form>

  <script>
    document.getElementById('togglePassword').addEventListener('click', function () {
      const passwordInput = document.getElementById('password');
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);

      // Met à jour l'icône SVG
      if (type === 'text') {
        this.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        `;
      } else {
        this.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        `;
      }
    });
  </script>

  <script type="module">
    import { supabase } from "./supabase.js";

    const form = document.getElementById("loginForm");
    const errorEl = document.getElementById("error");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.textContent = "";

      const btn = form.querySelector('button[type="submit"]');
      const originalText = btn.textContent;
      btn.textContent = "Connexion...";
      btn.disabled = true;

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        errorEl.textContent = "Identifiants invalides ou erreur de connexion.";
        btn.textContent = originalText;
        btn.disabled = false;
        return;
      }

      window.location.href = "accueil.html";
    });
  </script>

</body>

</html>
