<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Responsable</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="logo5.png">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0f172a">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<script src="./pwa.js"></script>

<body>
  <div class="container" style="max-width: 800px;">
    <h1>Tableau de Bord des Audits</h1>
    <div class="user-box" style="margin-bottom: 20px;">
      <p id="operatorName" class="success"></p>
    </div>

    <!-- Filtre Entreprise -->
    <div style="margin-bottom: 16px;">
      <label for="companySelect" style="display:block; margin-bottom:6px; font-weight:600;">Entreprise :</label>
      <select id="companySelect">
        <option value="">-- Choisir une entreprise --</option>
        <option value="BALTIMAR">Baltimar</option>
        <option value="REVEY">Revey</option>
      </select>
    </div>

    <!-- Filtre Atelier (Revey uniquement) -->
    <div id="atelierContainer" style="margin-bottom: 16px; display:none;">
      <label for="atelierSelect" style="display:block; margin-bottom:6px; font-weight:600;">Atelier :</label>
      <select id="atelierSelect">
        <option value="">-- Choisir un atelier --</option>
      </select>
    </div>

    <!-- Filtre Audit -->
    <div style="margin-bottom: 16px;">
      <label for="auditSelect" style="display:block; margin-bottom:6px; font-weight:600;">Type d'audit :</label>
      <select id="auditSelect" disabled>
        <option value="">-- Sélectionner une entreprise d'abord --</option>
      </select>
    </div>


    <!-- Safety Legend -->


    <div id="chartContainer" class="hidden"
      style="margin-top: 30px; background: var(--surface-color); padding: 20px; border-radius: var(--radius-lg); border: 1px solid var(--surface-border); position: relative;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="margin: 0; color: var(--text-main); flex-grow: 1; text-align: center;">Score par Zone (%)</h3>
        <button id="downloadBtn" title="Télécharger comme image"
          style="background: none; border: none; cursor: pointer; color: var(--text-secondary); padding: 5px; display: flex; align-items: center;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
        </button>
      </div>
      <canvas id="scoreChart"></canvas>
    </div>

    <p id="noDataMessage" class="hidden" style="text-align: center; margin-top: 20px; color: #f59e0b;">Aucune donnée
      d'audit trouvée pour cette sélection.</p>

    <div id="summaryTableContainer" class="hidden"
      style="margin-top: 30px; background: white; padding: 20px; border-radius: var(--radius-lg); border: 1px solid var(--surface-border);">
      <h3 style="text-align:center; margin-bottom: 20px; color: var(--text-main);">Tableau Récapitulatif</h3>
      <table class="questions-table" style="width: 100%;">
        <thead>
          <tr>
            <th style="text-align:left;">Zone</th>
            <th style="text-align:center;">Score (%)</th>
          </tr>
        </thead>
        <tbody id="summaryTableBody"></tbody>
      </table>
    </div>



    <!-- Historique des téléchargements -->
    <div style="margin-top: 30px; background: var(--surface-color); border-radius: var(--radius-lg); border: 1px solid var(--surface-border); overflow: hidden;">
      <div style="padding: 14px 20px; border-bottom: 1px solid var(--surface-border); display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0; color: var(--text-main); font-size:1rem;">📁 Rapports d'audit enregistrés</h3>
      </div>
      <!-- Filtres historique -->
      <div style="padding:10px 14px; border-bottom:1px solid var(--surface-border); background:#f8fafc; display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;">
        <div style="flex:1; min-width:90px;">
          <label style="font-size:0.75rem; font-weight:600; color:#64748b; display:block; margin:0 0 3px;">Entreprise</label>
          <select id="histFilterCompany" style="width:100%; padding:6px 8px; border:1px solid #e2e8f0; border-radius:8px; font-size:0.82rem; background:#fff; color:#1e293b; font-family:inherit;">
            <option value="">Toutes</option>
            <option value="baltimar">Baltimar</option>
            <option value="revey">Revey</option>
          </select>
        </div>
        <div style="flex:2; min-width:140px;">
          <label style="font-size:0.75rem; font-weight:600; color:#64748b; display:block; margin:0 0 3px;">Type d'audit</label>
          <select id="histFilterAudit" style="width:100%; padding:6px 8px; border:1px solid #e2e8f0; border-radius:8px; font-size:0.82rem; background:#fff; color:#1e293b; font-family:inherit;">
            <option value="">Tous</option>
          </select>
        </div>
        <div style="flex:2; min-width:120px;">
          <label style="font-size:0.75rem; font-weight:600; color:#64748b; display:block; margin:0 0 3px;">Zone</label>
          <select id="histFilterZone" style="width:100%; padding:6px 8px; border:1px solid #e2e8f0; border-radius:8px; font-size:0.82rem; background:#fff; color:#1e293b; font-family:inherit;">
            <option value="">Toutes</option>
          </select>
        </div>
      </div>
      <div id="downloadHistoryList" style="max-height:300px; overflow-y:auto; padding: 8px 0;">
        <p style="color:#94a3b8;text-align:center;font-size:0.85rem;padding:16px;">Chargement…</p>
      </div>
    </div>

    <div class="btn-container" style="margin-top: 30px; display: flex; flex-direction: column; gap: 10px;">
      <a href="accueil.html" class="btn-retour" style="text-decoration: none; text-align: center;">← Retour à l'accueil</a>
    </div>
    
  </div>

  <div id="zoneSpeechBubble" class="speech-bubble hidden"></div>

  <script type="module" src="./visualisation.js"></script>
</body>

</html>
